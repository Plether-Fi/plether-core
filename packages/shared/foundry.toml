[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
cache_path = "cache"
libs = ["../../lib"]
auto_detect_remappings = false
remappings = [
    "@plether/shared/=src/",
    "@plether/test-utils/=test-support/",
    "@openzeppelin/contracts/=../../lib/openzeppelin-contracts/contracts/",
    "@morpho-blue/=../../lib/morpho-blue/src/",
    "forge-std/=../../lib/forge-std/src/",
]
solc = "0.8.35"
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
via_ir = true

[fuzz]
seed = "0xdeadbeef"
runs = 256

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
single_line_statement_blocks = "multi"
sort_imports = true
contract_new_lines = true

[invariant]
runs = 16
depth = 500
