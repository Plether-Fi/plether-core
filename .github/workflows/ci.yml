name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FOUNDRY_PROFILE: ci

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Check formatting
        run: forge fmt --check packages test script

      - name: Check package boundaries
        run: bash scripts/check-package-boundaries.sh

      - name: Build
        run: forge build --sizes --skip test

      - name: Run integration and script tests
        run: forge test --no-match-path "test/fork/*"

  package-test:
    name: Package (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [shared, spot, options, perps]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Build package
        run: forge build --sizes --skip test --skip script --root packages/${{ matrix.package }}

      - name: Run package fuzz and invariant tests
        if: matrix.package != 'shared'
        run: forge test -vvv --root packages/${{ matrix.package }} --match-test "testFuzz_|invariant_"

      - name: Run package tests
        if: matrix.package != 'shared'
        run: forge test --root packages/${{ matrix.package }} --no-match-test "testFuzz_|invariant_"

  coverage-core:
    name: Coverage (core protocol)
    runs-on: ubuntu-latest
    env:
      FOUNDRY_SRC: packages/spot/src
      FOUNDRY_TEST: packages/spot/test
      FOUNDRY_SCRIPT: integration/src
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Run coverage
        run: bash scripts/run-with-heartbeat.sh forge coverage --ir-minimum --report lcov --report-file "$GITHUB_WORKSPACE/lcov-core.raw.info" --no-match-test "testFuzz_|invariant_"

      - name: Filter coverage report
        run: awk -v scope=spot -f scripts/filter-lcov-by-scope.awk lcov-core.raw.info > lcov-core.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./lcov-core.info
          flags: core_protocol
          name: core-protocol
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage-perps:
    name: Coverage (perps)
    runs-on: ubuntu-latest
    env:
      FOUNDRY_SRC: packages/perps/src
      FOUNDRY_TEST: packages/perps/test
      FOUNDRY_SCRIPT: integration/src
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Run coverage
        run: bash scripts/run-with-heartbeat.sh forge coverage --report lcov --report-file "$GITHUB_WORKSPACE/lcov-perps.raw.info" --no-match-test "testFuzz_|invariant_|test_H01_UpdateMarkUsesPublishTime|test_GetTraderAccount_Withdrawable(Decreases|Drops)"

      - name: Filter coverage report
        run: awk -v scope=perps -f scripts/filter-lcov-by-scope.awk lcov-perps.raw.info > lcov-perps.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./lcov-perps.info
          flags: perps
          name: perps
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage-options:
    name: Coverage (options)
    runs-on: ubuntu-latest
    env:
      FOUNDRY_SRC: packages/options/src
      FOUNDRY_TEST: packages/options/test
      FOUNDRY_SCRIPT: integration/src
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Run coverage
        run: bash scripts/run-with-heartbeat.sh forge coverage --ir-minimum --report lcov --report-file "$GITHUB_WORKSPACE/lcov-options.raw.info" --no-match-test "testFuzz_|invariant_"

      - name: Filter coverage report
        run: awk -v scope=options -f scripts/filter-lcov-by-scope.awk lcov-options.raw.info > lcov-options.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./lcov-options.info
          flags: options
          name: options
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  slither:
    name: Slither (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [shared, spot, options, perps]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Run Slither
        run: slither packages/${{ matrix.package }} --config-file slither.config.json --sarif results-${{ matrix.package }}.sarif || true

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results-${{ matrix.package }}.sarif
          category: slither-${{ matrix.package }}
