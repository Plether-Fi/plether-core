name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FOUNDRY_PROFILE: ci

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --sizes --skip test

      - name: Run fuzz tests
        run: forge test -vvv --match-test "testFuzz_|invariant_" --no-match-path "test/fork/*"

      - name: Run tests
        run: forge test --no-match-path "test/fork/*" --no-match-test "testFuzz_|invariant_"

  coverage-core:
    name: Coverage (core protocol)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Prepare coverage scope
        run: bash scripts/prepare-coverage-scope.sh core

      - name: Run coverage
        run: bash scripts/run-with-heartbeat.sh forge coverage --ir-minimum --report lcov --no-match-test "testFuzz_|invariant_"

      - name: Filter coverage report
        run: awk -v scope=core -f scripts/filter-lcov-by-scope.awk lcov.info > lcov-core.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./lcov-core.info
          flags: core_protocol
          name: core-protocol
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage-perps:
    name: Coverage (perps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Prepare coverage scope
        run: bash scripts/prepare-coverage-scope.sh perps

      - name: Run coverage
        run: bash scripts/run-with-heartbeat.sh forge coverage --ir-minimum --report lcov --match-path "test/perps/**/*.sol" --no-match-test "testFuzz_|invariant_|test_H01_UpdateMarkUsesPublishTime|test_GetTraderAccount_Withdrawable(Decreases|Drops)"

      - name: Filter coverage report
        run: awk -v scope=perps -f scripts/filter-lcov-by-scope.awk lcov.info > lcov-perps.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./lcov-perps.info
          flags: perps
          name: perps
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage-options:
    name: Coverage (options)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Prepare coverage scope
        run: bash scripts/prepare-coverage-scope.sh options

      - name: Run coverage
        run: bash scripts/run-with-heartbeat.sh forge coverage --ir-minimum --report lcov --match-path "test/options/**/*.sol" --no-match-test "testFuzz_|invariant_"

      - name: Filter coverage report
        run: awk -v scope=options -f scripts/filter-lcov-by-scope.awk lcov.info > lcov-options.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./lcov-options.info
          flags: options
          name: options
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  slither:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Run Slither
        run: slither src/ --config-file slither.config.json --sarif results.sarif || true

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif
