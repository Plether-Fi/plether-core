name: Deploy Documentation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
    paths:
      - ".github/pages/**"
      - ".github/workflows/docs.yml"
      - "assets/**"
      - "foundry.toml"
      - ".gitmodules"
      - "lib/**"
      - "packages/**"
      - "README.md"
      - "SECURITY.md"
      - "scripts/build-docs-site.sh"
      - "scripts/run-with-heartbeat.sh"
      - "test/README.md"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

# Keep only the latest documentation run for each ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Build documentation
        env:
          DOCS_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash scripts/run-with-heartbeat.sh bash scripts/build-docs-site.sh

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs/book

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
