name: Deploy Documentation

on:
  push:
    branches: [master, main]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Build documentation
        env:
          FOUNDRY_PROFILE: docs
        run: |
          mkdir -p .docs-empty/test .docs-empty/script

          # Generate NatSpec docs
          bash scripts/run-with-heartbeat.sh forge doc

          # Add SECURITY.md to docs
          cp SECURITY.md docs/src/SECURITY.md
          echo "" >> docs/src/SUMMARY.md
          echo "# Additional Documentation" >> docs/src/SUMMARY.md
          echo "- [Security](SECURITY.md)" >> docs/src/SUMMARY.md

          # Build the book
          bash scripts/run-with-heartbeat.sh forge doc --build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
