[profile.default]
src = "integration/src"
out = "out"
libs = ["lib"]
auto_detect_remappings = false

# Remappings
remappings = [
    "@plether/shared/=packages/shared/src/",
    "@plether/spot/=packages/spot/src/",
    "@plether/options/=packages/options/src/",
    "@plether/perps/=packages/perps/src/",
    "@plether/test-utils/=packages/shared/test-support/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@morpho-blue/=lib/morpho-blue/src/",
    "forge-std/=lib/forge-std/src/",
]

# Compiler settings
solc = "0.8.35"
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
via_ir = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

# File system permissions for scripts
fs_permissions = [{ access = "read", path = "script/bytecode/" }]

[fuzz]
seed = "0xdeadbeef"
runs = 256

[profile.halmos]
optimizer = false
via_ir = true

[profile.ci]
src = "integration/src"
out = "out"
libs = ["lib"]
solc = "0.8.35"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.docs]
test = ".docs-empty/test"
script = ".docs-empty/script"
optimizer = false
via_ir = true

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
single_line_statement_blocks = "multi"
sort_imports = true
contract_new_lines = true

[invariant]
runs = 16        # instead of 256
depth = 500
